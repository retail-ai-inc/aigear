services:
  model_service:
    build:
      context: .
      dockerfile: Dockerfile.ms
#    image: ms_test:latest
    working_dir: /ms
    ports:
      - 50051:50051
    command: |
      sh -c "
      $$VENV_MS/bin/aigear-task grpc --version logistic_regression --module src.pipelines.logistic_regression.model_service.logistic_regression_service.ModelService &&
      tail -f /dev/null
      "
    volumes:
      - .:/ms:rw

